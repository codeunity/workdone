name: Release Assets

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to publish assets for (for example: v0.1.0)"
        required: true
        type: string
  release:
    types:
      - published
      - released
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish assets for (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build_release_assets:
    name: Build release ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name || github.event.inputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            target: bun-windows-x64
            ext: .exe
          - os: macos-14
            label: darwin-arm64
            target: bun-darwin-arm64
            ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = "workdone-${{ env.RELEASE_TAG }}-${{ matrix.label }}${{ matrix.ext }}"
          bun build --compile --target=${{ matrix.target }} src/cli.ts --outfile "dist/$output"
          "OUTPUT_NAME=$output" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: |
          output="workdone-${RELEASE_TAG}-${{ matrix.label }}${{ matrix.ext }}"
          bun build --compile --target=${{ matrix.target }} src/cli.ts --outfile "dist/$output"
          echo "OUTPUT_NAME=$output" >> "$GITHUB_ENV"

      - name: Smoke check executable (Windows)
        if: runner.os == 'Windows'
        run: |
          .\dist\${{ env.OUTPUT_NAME }} --help
          .\dist\${{ env.OUTPUT_NAME }} report --help

      - name: Smoke check executable (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x ./dist/${{ env.OUTPUT_NAME }}
          ./dist/${{ env.OUTPUT_NAME }} --help
          ./dist/${{ env.OUTPUT_NAME }} report --help

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = Get-FileHash -Algorithm SHA256 "dist/${{ env.OUTPUT_NAME }}"
          "$($hash.Hash.ToLower())  ${{ env.OUTPUT_NAME }}" | Out-File -Encoding ascii "dist/${{ env.OUTPUT_NAME }}.sha256"

      - name: Generate checksum (macOS)
        if: runner.os == 'macOS'
        run: |
          shasum -a 256 "dist/${{ env.OUTPUT_NAME }}" > "dist/${{ env.OUTPUT_NAME }}.sha256"

      - name: Upload intermediate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            dist/${{ env.OUTPUT_NAME }}
            dist/${{ env.OUTPUT_NAME }}.sha256
          if-no-files-found: error

  publish_assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build_release_assets
    env:
      RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name || github.event.inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directory
        run: |
          mkdir -p dist-flat
          find dist -type f -exec cp {} dist-flat/ \;

      - name: Upload assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${RELEASE_TAG}" dist-flat/* --clobber
