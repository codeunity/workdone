name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Smoke check CLI help
        run: |
          bun run src/cli.ts --help
          bun run src/cli.ts report --help

  build_artifacts:
    name: Build ${{ matrix.label }}
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            target: bun-windows-x64
            output: workdone-windows-x64.exe
          - os: macos-14
            label: darwin-arm64
            target: bun-darwin-arm64
            output: workdone-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable
        run: bun build --compile --target=${{ matrix.target }} src/cli.ts --outfile dist/${{ matrix.output }}

      - name: Smoke check executable (Windows)
        if: runner.os == 'Windows'
        run: |
          .\dist\${{ matrix.output }} --help
          .\dist\${{ matrix.output }} report --help

      - name: Smoke check executable (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x ./dist/${{ matrix.output }}
          ./dist/${{ matrix.output }} --help
          ./dist/${{ matrix.output }} report --help

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: workdone-main-${{ matrix.label }}-${{ github.sha }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error
